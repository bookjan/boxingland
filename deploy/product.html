<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備型錄 PDF｜台北・永和拳擊天地 Boxing Land</title>
  <meta name="description" content="查看拳擊天地台北・永和設備型錄 PDF，包含拳擊、格鬥、地墊、牆墊、擂台、籠架與訓練設備資訊。">
  <meta name="robots" content="noindex,follow">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:title" content="設備型錄 PDF｜台北・永和拳擊天地 Boxing Land">
  <meta property="og:description" content="查看拳擊天地台北・永和設備型錄 PDF，或透過 LINE 詢問設備與場地規劃。">
  <meta property="og:url" content="https://boxingland.pages.dev/product">
  <meta property="og:image" content="https://boxingland.pages.dev/assets/og-boxingland.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="設備型錄 PDF｜台北・永和拳擊天地 Boxing Land">
  <meta name="twitter:description" content="查看拳擊天地台北・永和設備型錄 PDF，或透過 LINE 詢問設備與場地規劃。">
  <meta name="twitter:image" content="https://boxingland.pages.dev/assets/og-boxingland.jpg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root {
      --ink: #141111;
      --panel: #201c1b;
      --panel-2: #2a2524;
      --line: rgba(255,255,255,.16);
      --muted: rgba(255,255,255,.68);
      --white: #fff;
      --gold: #d6a83f;
      --red: #df2b22;
      --red-dark: #b82019;
      --line-green: #067a3a;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      background: var(--ink);
      color: var(--white);
    }
    a { color: inherit; text-decoration: none; }
    button, a { touch-action: manipulation; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      min-height: 88px;
      padding: 18px clamp(18px, 4vw, 56px);
      border-bottom: 1px solid var(--line);
      background: rgba(20,17,17,.94);
      backdrop-filter: blur(14px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }
    .brand img {
      width: 150px;
      height: 56px;
      object-fit: contain;
    }
    .brand span {
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-size: 15px;
      font-weight: 900;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--red); border-color: var(--red); color: var(--white); }
    .btn-primary:hover { background: var(--red-dark); border-color: var(--red-dark); }
    .btn-line { background: var(--line-green); border-color: var(--line-green); color: var(--white); }
    .btn-ghost { background: rgba(255,255,255,.06); color: var(--white); }
    .btn-light { background: var(--white); border-color: var(--white); color: var(--ink); }

    .pdf-section {
      width: 100%;
      margin: 0 auto;
      padding: 0 0 84px;
    }
    .pdf-shell {
      height: calc(100vh - 88px - 84px);
      min-height: 720px;
      overflow: hidden;
      border: 0;
      border-radius: 0;
      background: #080707;
    }
    .pdf-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #111;
    }
    .pdf-fallback {
      padding: 28px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }
    .pdf-mobile {
      display: none;
      min-height: calc(100vh - 88px);
      padding: 34px 18px;
      background: #080707;
    }
    .pdf-mobile-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      background: var(--panel);
    }
    .pdf-mobile-card h2 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }
    .pdf-mobile-card p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }

    .inquiry-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      border-top: 1px solid var(--line);
      background: rgba(20,17,17,.94);
      backdrop-filter: blur(16px);
    }
    .dock-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: min(1480px, calc(100% - 48px));
      min-height: 84px;
      margin: 0 auto;
    }
    .dock-title {
      min-width: 0;
      color: rgba(255,255,255,.78);
      font-size: 15px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dock-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .empty {
      min-height: calc(100vh - 88px);
      display: grid;
      place-items: center;
      padding: 40px 20px;
      text-align: center;
    }
    .empty h1 { font-size: clamp(32px, 5vw, 56px); }
    .empty p {
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .brand img {
        width: 124px;
        height: 46px;
      }
      .pdf-section { width: 100%; }
      .pdf-shell { display: none; }
      .pdf-mobile { display: block; min-height: auto; }
      .inquiry-dock { position: static; }
      .dock-inner {
        width: min(100% - 32px, 1480px);
        min-height: auto;
        padding: 12px 0;
        align-items: stretch;
        flex-direction: column;
      }
      .dock-title { white-space: normal; }
      .dock-actions { display: grid; grid-template-columns: 1fr 1fr; }
      .dock-actions .btn { min-width: 0; padding: 0 12px; }
      .dock-actions .btn-line { grid-column: 1 / -1; }
    }

    @media (max-width: 560px) {
      .brand span { font-size: 24px; }
      .nav-actions { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .btn { width: 100%; min-height: 44px; padding: 0 8px; font-size: 13px; }
      .pdf-section {
        width: 100%;
        padding-bottom: 0;
      }
      .dock-actions { grid-template-columns: 1fr; }
      .dock-actions .btn-line { grid-column: auto; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <noscript>
    <p class="pdf-fallback"><a href="index.html#equipment">瀏覽器未啟用 JavaScript，返回設備型錄</a></p>
  </noscript>
  <header class="topbar">
    <a class="brand" href="index.html#equipment" aria-label="回到拳擊天地設備列表">
      <img src="boxing-land-logo-white.png" alt="拳擊天地" width="900" height="506">
      <span>BOXING LAND</span>
    </a>
    <nav class="nav-actions" aria-label="商品頁導覽">
      <a class="btn btn-ghost" href="index.html#equipment">設備型錄</a>
      <a class="btn btn-ghost" href="index.html#coaches">拳擊教練</a>
      <a class="btn btn-line" href="https://line.me/R/ti/p/@jpe7785z" target="_blank" rel="noopener">LINE 詢問</a>
    </nav>
  </header>

  <main id="productPage" hidden>
    <h1 class="sr-only" id="productTitle">設備型錄 PDF</h1>
    <section class="pdf-section" aria-label="商品 PDF 詳細資料">
      <div class="pdf-shell">
        <iframe class="pdf-frame" id="pdfFrame" title="商品 PDF"></iframe>
      </div>
      <div class="pdf-mobile">
        <div class="pdf-mobile-card">
          <h2 id="mobilePdfTitle">設備型錄 PDF</h2>
          <p>手機瀏覽器不穩定支援內嵌 PDF。請直接開啟 PDF 檔，可用系統瀏覽器或閱讀器縮放與分享。</p>
          <a class="btn btn-primary" id="mobilePdfLink" href="index.html#equipment" target="_blank" rel="noopener">開啟 PDF</a>
        </div>
      </div>
    </section>
  </main>

  <div class="inquiry-dock" id="inquiryDock" hidden>
    <div class="dock-inner">
      <div class="dock-title" id="dockTitle"></div>
      <div class="dock-actions">
        <a class="btn btn-light" id="openPdf" href="index.html#equipment" target="_blank" rel="noopener">另開 PDF</a>
        <a class="btn btn-ghost" href="index.html#equipment">返回設備型錄</a>
        <a class="btn btn-line" href="https://line.me/R/ti/p/@jpe7785z" target="_blank" rel="noopener">LINE 詢問</a>
      </div>
    </div>
  </div>

  <script src="assets/catalog/products.js"></script>
  <script>
    const products = window.catalogProducts || [];
    const slug = location.hash.replace(/^#/, '').replace(/^product\//, '');
    const productId = Number((slug.match(/^(\d+)(?:-|$)/) || [])[1]);
    const product = products.find((item) => item.slug === slug) || products.find((item) => item.id === productId);
    const productPage = document.getElementById('productPage');
    const inquiryDock = document.getElementById('inquiryDock');

    if (!product) {
      location.replace('index.html#equipment');
    } else {
      document.title = `${product.title}｜設備型錄 PDF｜台北・永和拳擊天地 Boxing Land`;
      document.getElementById('productTitle').textContent = product.title;
      document.getElementById('dockTitle').textContent = product.title;
      document.getElementById('openPdf').href = product.pdf;
      document.getElementById('mobilePdfTitle').textContent = product.title;
      document.getElementById('mobilePdfLink').href = product.pdf;
      const pdfFrame = document.getElementById('pdfFrame');
      const pdfSrc = `${product.pdf}#view=Fit&zoom=page-fit&toolbar=1&navpanes=0`;
      const pdfMedia = matchMedia('(max-width: 900px)');
      const syncPdfFrame = () => {
        if (!pdfMedia.matches && !pdfFrame.getAttribute('src')) pdfFrame.src = pdfSrc;
      };
      syncPdfFrame();
      if (pdfMedia.addEventListener) {
        pdfMedia.addEventListener('change', syncPdfFrame);
      } else {
        pdfMedia.addListener(syncPdfFrame);
      }
      pdfFrame.title = product.title;
      productPage.hidden = false;
      inquiryDock.hidden = false;
    }
  </script>
</body>
</html>
